model:
  current_model: default
  models:
    default:
      base_url: http://127.0.0.1:8000/v1
      model: your-model-name
      api_key: EMPTY

agent:
  llm_args:
    temperature: 0.2
    max_tokens: 4096
    return_meta: true
    session_max_steps: 3
    max_retrieval_steps: 3

stm:
  fsm:
    thresholds:
      gap_delta: 0.3
      min_support: 3
      max_steps: 2

ltm:
  enabled: true
  store_dir: ltm/knowledgebase

cmr:
  thresholds:
    signal: 0.6
    pattern: 0.6
    procedure: 0.6
    case: 0.6
  pattern_alignment_weight: 0.5
  pattern_coverage_weight: 0.5
  signal_top_k: 6
  pattern_top_k: 3
  procedure_top_k: 3
  case_top_k: 3

consolidation:
  enabled: false

